version: "3.8"

services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  server:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/aivault_db
      - JWT_SECRET=- JWT_SECRET=${JWT_SECRET}
      - GROQ_API_KEY=- GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      - mongodb

  client:
    build: ./client
    ports:
      - "5173:5173"
    depends_on:
      - server

volumes:
  mongo_data: